services:
  laravel-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: laravel-prod
    restart: unless-stopped
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_started
    env_file:
      - .env
    networks:
      - app_network

  nginx-prod:
    image: nginx:latest
    container_name: nginx-prod
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - laravel-prod
    networks:
      - app_network

  postgres-prod:
    image: postgres:17
    container_name: postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: tall_home_budget
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d tall_home_budget" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-prod:
    image: redis:latest
    container_name: redis-prod
    networks:
      - app_network

networks:
  app_network:

volumes:
  pg_data_prod:
