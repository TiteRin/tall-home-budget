server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # NOUVEAU : Routes Livewire spécifiques (doit être AVANT les autres règles)
    location ~ ^/livewire/ {
        try_files $uri /index.php?$query_string;
    }

    # Accès aux assets Vite
    location /build/ {
        alias /var/www/html/public/build/;
        try_files $uri =404;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Fichiers statiques classiques (SANS .js car Livewire peut servir du JS)
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=31536000";
    }

    # PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass laravel-prod:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Toutes les autres requêtes vers index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
